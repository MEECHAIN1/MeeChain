name: MeeChain CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # Manual trigger

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/meechain-backend
  FRONTEND_IMAGE_NAME: ${{ github.repository }}/meechain-frontend

jobs:
  # Job 1: Backend Testing & Linting
  backend-test:
    name: Backend - Test & Lint
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov black flake8 mypy

    - name: Lint with flake8
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Check formatting with black
      run: |
        black --check --diff .

    - name: Type check with mypy
      run: |
        mypy --ignore-missing-imports .

    - name: Run tests with pytest
      run: |
        pytest --cov=./ --cov-report=xml --cov-report=html

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests

  # Job 2: Frontend Testing & Build
  frontend-build:
    name: Frontend - Test & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./meechain-frontend
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: './meechain-frontend/package-lock.json'

    - name: Install dependencies
      run: npm ci

    - name: Lint with ESLint
      run: npm run lint || echo "No lint script found"

    - name: Type check
      run: npx tsc --noEmit

    - name: Build application
      run: npm run build
      env:
        NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}

    - name: Run tests
      run: npm test || echo "No test script found"

  # Job 3: Build & Push Docker Images
  docker-build:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata for Backend
      id: meta-backend
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=sha,prefix={{branch}}-

    - name: Build and push Backend Docker image
      uses: docker/build-push-action@v5
      with:
        context: ./meechain-backend
        push: true
        tags: ${{ steps.meta-backend.outputs.tags }}
        labels: ${{ steps.meta-backend.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Extract metadata for Frontend
      id: meta-frontend
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=sha,prefix={{branch}}-

    - name: Build and push Frontend Docker image
      uses: docker/build-push-action@v5
      with:
        context: ./meechain-frontend
        push: true
        tags: ${{ steps.meta-frontend.outputs.tags }}
        labels: ${{ steps.meta-frontend.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  # Job 4: Deploy to Staging
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    environment:
      name: staging
      url: https://staging.meechain.io

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Deploy to Staging (Render/Heroku/Railway example)
      run: |
        echo "Deploying to staging environment..."
        # Example for Render
        # curl -X POST https://api.render.com/deploy/srv-xxx \
        #   -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}"
        
        # Example for Railway
        # railway up --service meechain-backend
        
        echo "Staging deployment triggered"
      env:
        RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

    - name: Run smoke tests
      run: |
        echo "Running smoke tests on staging..."
        # curl -f https://staging.meechain.io/health || exit 1
        # curl -f https://staging.meechain.io:3000 || exit 1
        echo "Smoke tests passed"

  # Job 5: Deploy to Production
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    environment:
      name: production
      url: https://meechain.io

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Deploy to Production
      run: |
        echo "Deploying to production environment..."
        # Production deployment commands
        # Example: kubectl apply -f k8s/
        # Example: docker stack deploy -c docker-compose.prod.yml meechain
        
        echo "Production deployment completed"
      env:
        KUBECONFIG: ${{ secrets.KUBECONFIG }}
        DOCKER_HOST: ${{ secrets.DOCKER_HOST }}

    - name: Run production health checks
      run: |
        echo "Running production health checks..."
        # Health check endpoints
        # curl -f https://meechain.io/health || exit 1
        # curl -f https://meechain.io:3000 || exit 1
        
        # Performance check
        # curl -o /dev/null -s -w '%{time_total}\n' https://meechain.io/health
        
        echo "Production health checks passed"

  # Job 6: Security Scanning
  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'

    - name: Upload Trivy scan results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v2
      with:
        sarif_file: 'trivy-results.sarif'

    - name: Run Bandit security linter for Python
      run: |
        pip install bandit
        bandit -r ./meechain-backend -f json -o bandit-report.json || true

    - name: Run npm audit for Node.js
      run: |
        cd meechain-frontend
        npm audit --json > npm-audit.json || true

  # Job 7: Notifications
  notifications:
    name: Notifications
    runs-on: ubuntu-latest
    needs: [deploy-production, security-scan]
    if: always()
    
    steps:
    - name: Send Slack notification
      uses: 8398a7/action-slack@v3
      with:
        status: ${{ job.status }}
        fields: repo,message,commit,author,action,eventName,ref,workflow,job,took
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

    - name: Send email notification on failure
      if: failure()
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.gmail.com
        server_port: 465
        username: ${{ secrets.MAIL_USERNAME }}
        password: ${{ secrets.MAIL_PASSWORD }}
        subject: "MeeChain CI/CD Pipeline Failed"
        to: ${{ secrets.NOTIFICATION_EMAIL }}
        from: "MeeChain CI/CD <ci@meechain.io>"
        body: |
          Pipeline failed for commit: ${{ github.sha }}
          Workflow: ${{ github.workflow }}
          Job: ${{ job.name }}
          Status: ${{ job.status }}
          
          View details: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

  # Job 8: Documentation Generation
  docs-generation:
    name: Documentation Generation
    runs-on: ubuntu-latest
    needs: [backend-test]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Generate API documentation
      run: |
        cd meechain-backend
        python -c "
        import subprocess
        import sys
        subprocess.run([sys.executable, '-m', 'pip', 'install', 'fastapi'])
        subprocess.run([sys.executable, '-c', '
        import json
        from main import app
        open(\"openapi.json\", \"w\").write(json.dumps(app.openapi(), indent=2))
        '])
        "
        echo "OpenAPI schema generated"

    - name: Upload OpenAPI schema as artifact
      uses: actions/upload-artifact@v4
      with:
        name: openapi-schema
        path: meechain-backend/openapi.json
        retention-days: 30