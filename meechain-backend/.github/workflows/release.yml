name: Release Pipeline

on:
  push:
    tags:
      - 'v*'  # Push events to matching v*, i.e. v1.0, v20.15.10

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      version: ${{ steps.get_version.outputs.version }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Get version from tag
      id: get_version
      run: |
        VERSION="${GITHUB_REF#refs/tags/}"
        echo "version=${VERSION}" >> $GITHUB_OUTPUT
        echo "Releasing version: ${VERSION}"

    - name: Create Release
      id: create_release
      uses: softprops/action-gh-release@v1
      with:
        name: Release ${{ steps.get_version.outputs.version }}
        draft: false
        prerelease: false
        generate_release_notes: true
        files: |
          CHANGELOG.md
          meechain-backend/requirements.txt
          meechain-frontend/package.json

  build-and-push:
    name: Build and Push Release Images
    runs-on: ubuntu-latest
    needs: create-release
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push Backend with version tag
      uses: docker/build-push-action@v5
      with:
        context: ./meechain-backend
        push: true
        tags: |
          ghcr.io/${{ github.repository }}/meechain-backend:${{ needs.create-release.outputs.version }}
          ghcr.io/${{ github.repository }}/meechain-backend:latest
        labels: |
          org.opencontainers.image.version=${{ needs.create-release.outputs.version }}
          org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
          org.opencontainers.image.revision=${{ github.sha }}
          org.opencontainers.image.source=${{ github.event.repository.html_url }}

    - name: Build and push Frontend with version tag
      uses: docker/build-push-action@v5
      with:
        context: ./meechain-frontend
        push: true
        tags: |
          ghcr.io/${{ github.repository }}/meechain-frontend:${{ needs.create-release.outputs.version }}
          ghcr.io/${{ github.repository }}/meechain-frontend:latest
        labels: |
          org.opencontainers.image.version=${{ needs.create-release.outputs.version }}
          org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
          org.opencontainers.image.revision=${{ github.sha }}
          org.opencontainers.image.source=${{ github.event.repository.html_url }}

  deploy-release:
    name: Deploy Release
    runs-on: ubuntu-latest
    needs: [create-release, build-and-push]
    environment: production

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Deploy to Production
      run: |
        echo "Deploying version ${{ needs.create-release.outputs.version }} to production"
        
        # Example Kubernetes deployment
        # kubectl set image deployment/meechain-backend \
        #   meechain-backend=ghcr.io/${{ github.repository }}/meechain-backend:${{ needs.create-release.outputs.version }}
        # kubectl set image deployment/meechain-frontend \
        #   meechain-frontend=ghcr.io/${{ github.repository }}/meechain-frontend:${{ needs.create-release.outputs.version }}
        
        # Example Docker Compose
        # export VERSION=${{ needs.create-release.outputs.version }}
        # docker-compose -f docker-compose.prod.yml up -d
        
        echo "Release ${{ needs.create-release.outputs.version }} deployed successfully"

    - name: Verify deployment
      run: |
        echo "Verifying deployment..."
        sleep 30  # Wait for services to start
        
        # Health checks
        # curl -f https://meechain.io/health || exit 1
        # curl -f https://meechain.io:3000 || exit 1
        
        echo "Deployment verified successfully"

  notify-release:
    name: Notify Release
    runs-on: ubuntu-latest
    needs: deploy-release
    if: always()

    steps:
    - name: Send release notification to Slack
      uses: 8398a7/action-slack@v3
      with:
        status: ${{ job.status }}
        text: "Release ${{ needs.create-release.outputs.version }} has been ${{ job.status == 'success' && 'deployed' || 'failed' }}"
        fields: repo,message,commit,author,action,eventName,ref,workflow,job,took
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

    - name: Update deployment tracking
      run: |
        echo "Updating deployment tracking..."
        # Could update a deployment tracking system
        # or send metrics to monitoring system
        echo "Deployment tracking updated"